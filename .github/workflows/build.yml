name: Build APK

on:
  workflow_dispatch:
    inputs:
      game_folder:
        description: 'Nama folder game di /games'
        required: true
        default: 'sample'
      app_name:
        description: 'Nama aplikasi'
        required: true
        default: 'My HTML Game'
      version_name:
        description: 'Version name, misal 1.0.0 (kosong = default template)'
        required: false
        default: ''
      package_id:
        description: 'Package ID / applicationId, misal com.bosquh.neonstrike (kosong = default template)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Copy game HTML ke assets
        run: |
          mkdir -p android-template/app/src/main/assets/www
          cp -r games/${{ github.event.inputs.game_folder }}/* \
                android-template/app/src/main/assets/www/

      - name: Set app name
        run: |
          sed -i "s/My HTML Game/${{ github.event.inputs.app_name }}/g" \
            android-template/app/src/main/res/values/strings.xml

      - name: Inject per-game icon (kalau ada)
        run: |
          SRC="games/${{ github.event.inputs.game_folder }}/icon.png"
          RES="android-template/app/src/main/res"
          if [ -f "$SRC" ] && [ -d "$RES" ]; then
            echo "icon custom ditemukan -> inject"
            rm -rf "$RES/mipmap-anydpi-v26"
            rm -f "$RES"/mipmap-*/ic_launcher* "$RES"/mipmap-*/ic_launcher_round*
            mkdir -p "$RES/mipmap-xxxhdpi"
            cp "$SRC" "$RES/mipmap-xxxhdpi/ic_launcher.png"
            cp "$SRC" "$RES/mipmap-xxxhdpi/ic_launcher_round.png"
            echo "icon terpasang di mipmap-xxxhdpi"
          else
            echo "tidak ada icon custom -> pakai icon default template"
          fi

      - name: Set version & package (kalau diisi)
        run: |
          G="android-template/app/build.gradle"
          [ -f "$G" ] || G="android-template/build.gradle"
          if [ -f "$G" ]; then
            echo "build.gradle = $G"
            VN="${{ github.event.inputs.version_name }}"
            PKG="${{ github.event.inputs.package_id }}"
            VC="${{ github.run_number }}"
            [ -z "$VC" ] && VC=$(date +%y%m%d)
            echo "  target: versionName='$VN' applicationId='$PKG' versionCode=$VC"
            VN="$VN" PKG="$PKG" VC="$VC" perl -pi -e 's/(versionName[^"=]*[= ]*")[^"]*(")/${1}$ENV{VN}${2}/g if $ENV{VN}; s/(applicationId[^"=]*[= ]*")[^"]*(")/${1}$ENV{PKG}${2}/g if $ENV{PKG}; s/(versionCode[^0-9]*)[0-9]+/${1}$ENV{VC}/g;' "$G"
            echo "  version & package diterapkan"
          else
            echo "build.gradle tidak ditemukan di path standar -> version/package pakai default"
          fi

      - name: Generate wrapper & build APK
        run: |
          cd android-template
          echo "android.useAndroidX=true" > gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: android-template/app/build/outputs/apk/debug/*.apk

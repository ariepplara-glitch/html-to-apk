name: Build APK

on:
  workflow_dispatch:
    inputs:
      game_folder:
        description: 'Nama folder game di /games'
        required: true
        default: 'sample'
      app_name:
        description: 'Nama aplikasi'
        required: true
        default: 'My HTML Game'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Copy game HTML ke assets
        run: |
          mkdir -p android-template/app/src/main/assets/www
          cp -r games/${{ github.event.inputs.game_folder }}/* \
                android-template/app/src/main/assets/www/

      - name: Set app name
        run: |
          sed -i "s/My HTML Game/${{ github.event.inputs.app_name }}/g" \
            android-template/app/src/main/res/values/strings.xml

      - name: Generate wrapper & build APK
        run: |
          cd android-template
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: android-template/app/build/outputs/apk/debug/*.apk

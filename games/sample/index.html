<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Pesawat vs Alien</title>

    <style>
        /* ========== CSS: TAMPILAN GAME ========== */
        
        /* Reset & Style Halaman */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a2e;        /* Warna latar hitam kebiruan */
            display: flex;               /* Flexbox untuk centering */
            justify-content: center;     /* Tengah horizontal */
            align-items: center;         /* Tengah vertikal */
            min-height: 100vh;           /* Tinggi minimal = 100% layar */
            font-family: 'Courier New', monospace;
        }

        /* Container Game */
        .game-container {
            text-align: center;          /* Teks di tengah */
            background: #1a1a3e;         /* Latar belakang container */
            padding: 20px;
            border-radius: 15px;         /* Sudut melengkung */
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);  /* Cahaya biru */
        }

        /* Judul Game */
        h1 {
            color: #00ffff;              /* Warna cyan */
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px cyan;  /* Efek glow */
        }

        /* ===== CANVAS: Arena Game ===== */
        canvas {
            border: 3px solid #00ffff;   /* Pinggiran cyan */
            border-radius: 10px;
            background: #000;            /* Background hitam */
            display: block;              /* Canvas sebagai block */
            margin: 0 auto;              /* Tengah */
            cursor: none;                /* Sembunyikan kursor */
        }

        /* Panel Informasi */
        .info-panel {
            display: flex;
            justify-content: space-between;  /* Kiri vs Kanan */
            align-items: center;
            margin-top: 15px;
            color: white;
            font-size: 18px;
            padding: 10px 20px;
            background: #0d0d30;
            border-radius: 8px;
        }

        /* Skor */
        #scoreDisplay {
            color: #00ff88;              /* Hijau terang */
            font-weight: bold;
            font-size: 22px;
        }

        /* Tombol Restart */
        #restartBtn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #restartBtn:hover {
            background: #ff6666;
            transform: scale(1.05);      /* Efek membesar */
        }

        /* Petunjuk Keyboard */
        .controls {
            color: #aaa;
            font-size: 14px;
            margin-top: 8px;
        }

        .controls span {
            background: #333;
            padding: 3px 10px;
            border-radius: 4px;
            color: #00ffff;
            margin: 0 3px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Judul -->
        <h1>🚀 PESAWAT vs 👾 ALIEN</h1>

        <!-- ===== CANVAS: Tempat game digambar ===== -->
        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <!-- Panel Info: Skor & Restart -->
        <div class="info-panel">
            <div>
                💥 Skor: <span id="scoreDisplay">0</span>
            </div>
            <button id="restartBtn">🔄 Mulai Ulang</button>
        </div>

        <!-- Petunjuk Keyboard -->
        <div class="controls">
            <span>←</span> <span>→</span> Gerak &nbsp;|&nbsp; <span>Spasi</span> Tembak
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT: LOGIKA GAME LENGKAP ===== -->
    <!-- ============================================================ -->

    <script>
        // ============================================================
        // BAGIAN 1: AMBIL ELEMEN DARI HTML
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');   // Context 2D untuk menggambar
        const scoreSpan = document.getElementById('scoreDisplay');
        const restartBtn = document.getElementById('restartBtn');

        // ============================================================
        // BAGIAN 2: UKURAN DAN KONSTANTA GAME
        // ============================================================

        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 500;

        // Ukuran pesawat
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 40;
        const PLAYER_SPEED = 7;             // Kecepatan gerak

        // Ukuran alien
        const ALIEN_SIZE = 35;
        const ALIEN_SPEED = 1.5;            // Kecepatan turun
        const ALIEN_SPAWN_RATE = 0.02;      // Peluang spawn per frame

        // Ukuran bullet (laser)
        const BULLET_WIDTH = 4;
        const BULLET_HEIGHT = 15;
        const BULLET_SPEED = 8;             // Kecepatan naik

        // ============================================================
        // BAGIAN 3: VARIABEL GAME (STATE)
        // ============================================================

        let player = {
            x: CANVAS_WIDTH / 2 - PLAYER_WIDTH / 2,   // Posisi awal: tengah
            y: CANVAS_HEIGHT - PLAYER_HEIGHT - 20,     // Dekat bawah
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            speed: PLAYER_SPEED
        };

        let bullets = [];       // Array untuk menyimpan semua peluru
        let aliens = [];        // Array untuk menyimpan semua alien
        let score = 0;          // Skor awal
        let gameOver = false;   // Status game over
        let gameLoopId = null;  // ID untuk animasi loop

        // ============================================================
        // BAGIAN 4: INPUT KEYBOARD
        // ============================================================

        const keys = {
            left: false,
            right: false,
            space: false
        };

        // --- Event: Tombol ditekan ---
        document.addEventListener('keydown', function(e) {
            if (gameOver) return;   // Jika game over, abaikan input

            if (e.key === 'ArrowLeft' || e.key === 'Left' || e.key === 'a') {
                keys.left = true;
                e.preventDefault();   // Cegah scroll halaman
            }
            if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === 'd') {
                keys.right = true;
                e.preventDefault();
            }
            if (e.key === ' ') {        // Spasi = tembak
                keys.space = true;
                e.preventDefault();
                shootBullet();          // Panggil fungsi tembak
            }
        });

        // --- Event: Tombol dilepas ---
        document.addEventListener('keyup', function(e) {
            if (e.key === 'ArrowLeft' || e.key === 'Left' || e.key === 'a') {
                keys.left = false;
                e.preventDefault();
            }
            if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === 'd') {
                keys.right = false;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = false;
                e.preventDefault();
            }
        });

        // ============================================================
        // BAGIAN 5: FUNGSI-FUNGSI GAME
        // ============================================================

        /**
         * FUNGSI: Menembakkan peluru/laser
         * Membuat bullet baru di posisi depan pesawat
         */
        function shootBullet() {
            // Buat objek bullet baru
            let bullet = {
                x: player.x + player.width / 2 - BULLET_WIDTH / 2,  // Tengah pesawat
                y: player.y - BULLET_HEIGHT,                         // Depan pesawat
                width: BULLET_WIDTH,
                height: BULLET_HEIGHT,
                speed: BULLET_SPEED
            };
            bullets.push(bullet);   // Tambahkan ke array bullets
        }

        /**
         * FUNGSI: Membuat alien baru
         * Alien muncul di posisi X acak di bagian atas
         */
        function spawnAlien() {
            let alien = {
                x: Math.random() * (CANVAS_WIDTH - ALIEN_SIZE),   // Posisi X acak
                y: -ALIEN_SIZE,                                     // Mulai dari atas canvas
                size: ALIEN_SIZE,
                speed: ALIEN_SPEED + Math.random() * 0.5,           // Kecepatan bervariasi
                // Warna acak antara hijau, ungu, merah, oranye
                color: ['#33ff33', '#ff33ff', '#ff4444', '#ffaa00'][Math.floor(Math.random() * 4)]
            };
            aliens.push(alien);
        }

        /**
         * FUNGSI: Deteksi tabrakan (collision detection)
         * Menggunakan metode Axis-Aligned Bounding Box (AABB)
         * Dua objek bertabrakan jika kotak mereka saling tumpang tindih
         */
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        /**
         * FUNGSI: Update skor di layar
         */
        function updateScoreDisplay() {
            scoreSpan.textContent = score;
        }

        // ============================================================
        // BAGIAN 6: FUNGSI GAME LOOP (JANTUNG GAME)
        // ============================================================

        function gameLoop() {
            if (gameOver) {
                return;   // Hentikan loop jika game over
            }

            // ===== A. UPDATE (Logika) =====

            // 1. Gerakkan pesawat berdasarkan input keyboard
            if (keys.left && player.x > 0) {
                player.x -= player.speed;    // Geser ke kiri
            }
            if (keys.right && player.x < CANVAS_WIDTH - player.width) {
                player.x += player.speed;    // Geser ke kanan
            }

            // 2. Gerakkan bullets ke atas
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;   // Naik ke atas

                // Hapus bullet yang sudah keluar layar
                if (bullets[i].y + bullets[i].height < 0) {
                    bullets.splice(i, 1);
                    continue;
                }
            }

            // 3. Gerakkan alien ke bawah
            for (let i = aliens.length - 1; i >= 0; i--) {
                aliens[i].y += aliens[i].speed;     // Turun ke bawah

                // Hapus alien yang sudah keluar layar (lewat bawah)
                if (aliens[i].y > CANVAS_HEIGHT) {
                    aliens.splice(i, 1);
                    continue;
                }
            }

            // 4. Cek tabrakan: Bullet vs Alien
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = aliens.length - 1; j >= 0; j--) {
                    // Buat objek rect untuk deteksi tabrakan
                    let bulletRect = {
                        x: bullets[i].x,
                        y: bullets[i].y,
                        width: bullets[i].width,
                        height: bullets[i].height
                    };
                    let alienRect = {
                        x: aliens[j].x,
                        y: aliens[j].y,
                        width: aliens[j].size,
                        height: aliens[j].size
                    };

                    if (checkCollision(bulletRect, alienRect)) {
                        // Tabrakan! Hancurkan bullet dan alien
                        bullets.splice(i, 1);
                        aliens.splice(j, 1);
                        score += 10;                // Tambah skor
                        updateScoreDisplay();
                        break;                      // Keluar dari loop dalam
                    }
                }
            }

            // 5. Cek tabrakan: Alien vs Player (Game Over)
            for (let i = 0; i < aliens.length; i++) {
                let playerRect = {
                    x: player.x,
                    y: player.y,
                    width: player.width,
                    height: player.height
                };
                let alienRect = {
                    x: aliens[i].x,
                    y: aliens[i].y,
                    width: aliens[i].size,
                    height: aliens[i].size
                };

                if (checkCollision(playerRect, alienRect)) {
                    gameOver = true;    // Game Over!
                    break;
                }
            }

            // 6. Spawn alien baru secara random
            if (Math.random() < ALIEN_SPAWN_RATE) {
                spawnAlien();
            }

            // ===== B. RENDER (Menggambar) =====

            // Hapus semua gambar sebelumnya
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // --- Gambar Background: Langit malam berbintang ---
            // Gradasi langit
            let gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradient.addColorStop(0, '#000033');    // Biru gelap di atas
            gradient.addColorStop(1, '#0a0a2e');    // Biru kehitaman di bawah
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Bintang-bintang acak (digambar ulang tiap frame)
            ctx.fillStyle = 'white';
            for (let i = 0; i < 60; i++) {
                let starX = (i * 37 + 13) % CANVAS_WIDTH;
                let starY = (i * 53 + 7) % CANVAS_HEIGHT;
                let starSize = 1 + (i % 3);
                ctx.beginPath();
                ctx.arc(starX, starY, starSize, 0, Math.PI * 2);
                ctx.fill();
            }

            // --- Gambar Player: Pesawat berbentuk segitiga ---
            const px = player.x;
            const py = player.y;
            const pw = player.width;
            const ph = player.height;

            // Badan pesawat (segitiga)
            ctx.fillStyle = '#00ddff';   // Biru terang
            ctx.beginPath();
            ctx.moveTo(px + pw/2, py);                  // Ujung atas (hidung pesawat)
            ctx.lineTo(px + pw - 5, py + ph);            // Kanan bawah
            ctx.lineTo(px + 5, py + ph);                 // Kiri bawah
            ctx.closePath();
            ctx.fill();

            // Kokpit (lingkaran kecil)
            ctx.fillStyle = '#88ffff';
            ctx.beginPath();
            ctx.arc(px + pw/2, py + 10, 6, 0, Math.PI * 2);
            ctx.fill();

            // Api di belakang pesawat
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(px + pw/2 - 8, py + ph);
            ctx.lineTo(px + pw/2, py + ph + 12);
            ctx.lineTo(px + pw/2 + 8, py + ph);
            ctx.closePath();
            ctx.fill();

            // --- Gambar Aliens: Bentuk bulat dengan mata ---
            for (let alien of aliens) {
                const ax = alien.x;
                const ay = alien.y;
                const as = alien.size;

                // Badan alien (lingkaran)
                ctx.fillStyle = alien.color;
                ctx.beginPath();
                ctx.arc(ax + as/2, ay + as/2, as/2, 0, Math.PI * 2);
                ctx.fill();

                // Outline
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Mata (2 lingkaran putih)
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(ax + as/2 - 6, ay + as/2 - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ax + as/2 + 6, ay + as/2 - 4, 5, 0, Math.PI * 2);
                ctx.fill();

                // Pupil (lingkaran hitam)
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(ax + as/2 - 6, ay + as/2 - 4, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ax + as/2 + 6, ay + as/2 - 4, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Mulut (garis)
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(ax + as/2, ay + as/2 + 4, 6, 0, Math.PI);
                ctx.stroke();
            }

            // --- Gambar Bullets: Laser kuning ---
            for (let bullet of bullets) {
                // Laser outer (kuning terang)
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);

                // Efek glow (kuning lebih terang)
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;   // Reset shadow
            }

            // --- Jika Game Over, tampilkan teks ---
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';   // Layer gelap semi-transparan
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 50px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('💀 GAME OVER 💀', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 30);

                ctx.fillStyle = '#ffffff';
                ctx.font = '24px Courier New';
                ctx.fillText('Skor Akhir: ' + score, CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 30);

                ctx.fillStyle = '#aaaaaa';
                ctx.font = '16px Courier New';
                ctx.fillText('Tekan "Mulai Ulang" untuk main lagi', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 80);
            }

            // ===== C. LOOP LAGI =====
            gameLoopId = requestAnimationFrame(gameLoop);   // Panggil fungsi ini lagi
        }

        // ============================================================
        // BAGIAN 7: FUNGSI RESTART / RESET GAME
        // ============================================================

        function resetGame() {
            // Hentikan game loop yang sedang berjalan
            if (gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }

            // Reset semua variabel ke awal
            player.x = CANVAS_WIDTH / 2 - PLAYER_WIDTH / 2;
            player.y = CANVAS_HEIGHT - PLAYER_HEIGHT - 20;

            bullets = [];
            aliens = [];
            score = 0;
            gameOver = false;

            // Reset input keyboard
            keys.left = false;
            keys.right = false;
            keys.space = false;

            // Update tampilan skor
            updateScoreDisplay();

            // Mulai game loop lagi
            gameLoop();
        }

        // ============================================================
        // BAGIAN 8: EVENT LISTENER RESTART
        // ============================================================

        restartBtn.addEventListener('click', resetGame);

        // ============================================================
        // BAGIAN 9: MULAI GAME!
        // ============================================================

        updateScoreDisplay();   // Tampilkan skor awal (0)
        gameLoop();             // Mulai game loop!

        // ============================================================
        // PENJELASAN ALUR GAME:
        // ============================================================
        // 1. Program dimulai → panggil gameLoop()
        // 2. gameLoop() berjalan terus (~60 FPS) sampai gameOver = true
        // 3. Setiap loop:
        //    a. Baca input keyboard (kiri/kanan/spasi)
        //    b. Update posisi player, bullets, aliens
        //    c. Cek tabrakan (bullet-alien & alien-player)
        //    d. Generate alien baru (acak)
        //    e. Gambar ulang semua objek di canvas
        // 4. Jika game over → tampilkan teks merah
        // 5. Klik "Mulai Ulang" → resetGame() → mulai lagi dari awal
        // ============================================================

        console.log('🚀 Game Pesawat vs Alien sudah berjalan!');
        console.log('🕹️  Gunakan ← → untuk gerak, Spasi untuk tembak!');
    </script>

</body>
</html>

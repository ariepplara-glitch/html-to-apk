<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Neon Dodge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#070912;
    font-family:system-ui,Segoe UI,Roboto,sans-serif;color:#fff;touch-action:none;user-select:none}
  #game{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  /* HUD skor di atas */
  #hud{position:absolute;top:0;left:0;right:0;padding:14px 18px;
    display:flex;justify-content:space-between;pointer-events:none;
    font-weight:700;letter-spacing:1px;text-shadow:0 0 10px rgba(0,255,255,.6)}
  #hud .lbl{font-size:11px;opacity:.6;display:block}
  #hud .val{font-size:26px}
  #hud .hi .val{color:#ff4 d8;color:#ff4dd8;text-shadow:0 0 10px rgba(255,77,216,.6)}
  /* overlay start / game over */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:rgba(7,9,18,.78);backdrop-filter:blur(4px);padding:24px}
  .screen.hide{display:none}
  .title{font-size:40px;font-weight:900;letter-spacing:2px;
    background:linear-gradient(90deg,#00f0ff,#b14dff,#ff4dd8);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 18px rgba(120,80,255,.5))}
  .sub{margin-top:8px;opacity:.7;font-size:14px;max-width:280px;line-height:1.5}
  .big{font-size:54px;font-weight:900;margin:10px 0;color:#00f0ff;text-shadow:0 0 20px rgba(0,240,255,.6)}
  .btn{margin-top:26px;padding:16px 44px;border:0;border-radius:40px;cursor:pointer;
    font-size:18px;font-weight:800;letter-spacing:1px;color:#070912;
    background:linear-gradient(90deg,#00f0ff,#b14dff);
    box-shadow:0 0 24px rgba(120,80,255,.6);transition:transform .1s}
  .btn:active{transform:scale(.94)}
  .hint{margin-top:18px;font-size:12px;opacity:.5}
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div class="sc"><span class="lbl">SKOR</span><span class="val" id="score">0</span></div>
    <div class="hi"><span class="lbl">TERBAIK</span><span class="val" id="best">0</span></div>
  </div>

  <!-- layar mulai -->
  <div class="screen" id="startScr">
    <div class="title">NEON DODGE</div>
    <div class="sub">Geser jarimu untuk menggerakkan bola. Hindari rintangan neon yang jatuh!</div>
    <button class="btn" id="startBtn">MULAI</button>
    <div class="hint">Sentuh & geser • atau pakai mouse</div>
  </div>

  <!-- layar game over -->
  <div class="screen hide" id="overScr">
    <div class="title" style="font-size:30px">GAME OVER</div>
    <div class="sub">Skor kamu</div>
    <div class="big" id="finalScore">0</div>
    <div class="sub" id="newBest" style="color:#ff4dd8;display:none">🏆 REKOR BARU!</div>
    <button class="btn" id="retryBtn">MAIN LAGI</button>
  </div>
</div>

<script>
(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const elScore = document.getElementById('score');
  const elBest  = document.getElementById('best');
  const startScr = document.getElementById('startScr');
  const overScr  = document.getElementById('overScr');
  const finalScore = document.getElementById('finalScore');
  const newBest = document.getElementById('newBest');

  let W=0, H=0, dpr=1;
  const NEON = ['#00f0ff','#b14dff','#ff4dd8','#39ff14','#ffe600'];

  // state game
  let state = 'start';      // 'start' | 'play' | 'over'
  let score = 0, best = 0;
  let speed = 0, gridY = 0, spawnT = 0;
  let obstacles = [], particles = [];
  let player = {x:0, y:0, r:14, tx:0};
  let last = 0, paused = false;

  try { best = parseInt(localStorage.getItem('neonDodgeBest')||'0',10)||0; } catch(e){}
  elBest.textContent = best;

  // --- ukuran canvas (tajam & responsif) ---
  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.floor(W*dpr); cv.height = Math.floor(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    player.y = H - 90;
    if(player.x===0){ player.x = W/2; player.tx = W/2; }
    player.x = Math.max(player.r, Math.min(W-player.r, player.x));
  }
  window.addEventListener('resize', resize);

  // --- kontrol: pointer (sentuh + mouse jadi satu) ---
  let dragging = false;
  function pointerX(e){
    const rect = cv.getBoundingClientRect();
    return e.clientX - rect.left;
  }
  cv.addEventListener('pointerdown', e=>{ if(state==='play'){dragging=true; player.tx=pointerX(e);} });
  cv.addEventListener('pointermove', e=>{ if(dragging&&state==='play'){ player.tx=pointerX(e); e.preventDefault(); } }, {passive:false});
  window.addEventListener('pointerup', ()=> dragging=false);

  // --- mulai / ulang ---
  function start(){
    score=0; speed=3.2; gridY=0; spawnT=0;
    obstacles=[]; particles=[];
    player.x=W/2; player.tx=W/2; player.y=H-90;
    state='play';
    startScr.classList.add('hide');
    overScr.classList.add('hide');
    last = performance.now();
  }
  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);

  function gameOver(){
    state='over';
    const s = Math.floor(score);
    finalScore.textContent = s;
    if(s > best){
      best = s;
      try { localStorage.setItem('neonDodgeBest', String(best)); } catch(e){}
      elBest.textContent = best;
      newBest.style.display='block';
    } else { newBest.style.display='none'; }
    overScr.classList.remove('hide');
  }

  // --- spawn rintangan ---
  function spawn(){
    const w = 40 + Math.random()*90;
    obstacles.push({
      x: Math.random()*(W-w),
      y: -30, w:w, h:18+Math.random()*16,
      c: NEON[(Math.random()*NEON.length)|0]
    });
  }

  // --- partikel jejak ---
  function trail(){
    particles.push({x:player.x, y:player.y, r:player.r*0.8, life:1,
      c: NEON[(Math.random()*NEON.length)|0]});
    if(particles.length>60) particles.shift();
  }

  // --- update ---
  function update(dt){
    // difficulty naik pelan
    speed += dt*0.18;
    score += dt*speed*2.2;
    elScore.textContent = Math.floor(score);

    gridY = (gridY + speed*1.4) % 40;

    // pemain mengikuti jari (halus)
    player.x += (player.tx - player.x) * Math.min(1, dt*14);
    player.x = Math.max(player.r, Math.min(W-player.r, player.x));
    trail();

    // partikel
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.life -= dt*2.4; p.r *= 0.94;
      if(p.life<=0) particles.splice(i,1);
    }

    // spawn
    spawnT -= dt;
    const interval = Math.max(0.42, 1.05 - score*0.0009);
    if(spawnT<=0){ spawn(); spawnT = interval; }

    // rintangan + tabrakan
    const pr = player.r*0.8; // kotak tabrakan sedikit lebih kecil biar adil
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i]; o.y += speed*60*dt;
      // AABB vs lingkaran (didekati kotak)
      if(player.x+pr>o.x && player.x-pr<o.x+o.w &&
         player.y+pr>o.y && player.y-pr<o.y+o.h){
        gameOver(); return;
      }
      if(o.y>H){ obstacles.splice(i,1); }
    }
  }

  // --- gambar ---
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // latar gradasi
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0e1f'); g.addColorStop(1,'#070912');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // grid bergerak
    ctx.strokeStyle='rgba(120,90,255,0.10)'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let y=gridY;y<H;y+=40){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
    for(let x=0;x<W;x+=40){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
    ctx.stroke();

    // partikel jejak
    for(const p of particles){
      ctx.globalAlpha = Math.max(0,p.life)*0.5;
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0,p.r),0,7); ctx.fill();
    }
    ctx.globalAlpha=1;

    // rintangan neon
    for(const o of obstacles){
      ctx.shadowBlur=16; ctx.shadowColor=o.c; ctx.fillStyle=o.c;
      roundRect(o.x,o.y,o.w,o.h,6); ctx.fill();
    }
    ctx.shadowBlur=0;

    // pemain
    if(state!=='start'){
      ctx.shadowBlur=22; ctx.shadowColor='#00f0ff';
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,7); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#00f0ff';
      ctx.beginPath(); ctx.arc(player.x,player.y,player.r*0.55,0,7); ctx.fill();
    }
  }

  // --- loop utama ---
  function loop(now){
    requestAnimationFrame(loop);
    if(paused){ last=now; return; }
    let dt=(now-last)/1000; last=now;
    if(dt>0.05) dt=0.05;       // cegah lompatan
    if(state==='play') update(dt);
    draw();
  }

  // pause saat aplikasi di-background
  document.addEventListener('visibilitychange', ()=>{ paused = document.hidden; });

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>

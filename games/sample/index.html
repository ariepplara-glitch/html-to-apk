<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space War - Perang Antariksa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0e27 100%);
            border: 3px solid #4a90e2;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(74, 144, 226, 0.5);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(74, 144, 226, 0.8);
            z-index: 10;
        }

        #score, #lives, #wave {
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #4a90e2;
        }

        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #4a90e2;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.6);
            z-index: 100;
        }

        #gameOver h1, #startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #4a90e2;
            text-shadow: 0 0 20px rgba(74, 144, 226, 0.8);
        }

        #gameOver p, #startScreen p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(74, 144, 226, 0.6);
        }

        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="stars"></canvas>
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="score">Skor: 0</div>
            <div id="lives">Nyawa: ❤️❤️❤️</div>
            <div id="wave">Gelombang: 1</div>
        </div>

        <div id="startScreen">
            <h1>⚔️ SPACE WAR ⚔️</h1>
            <p>Lindungi Bumi dari Invasi Alien!</p>
            <button onclick="startGame()">MULAI PERMAINAN</button>
            <div class="controls">
                <p>🎮 Kontrol:</p>
                <p>← → : Gerak | SPACE : Tembak</p>
            </div>
        </div>

        <div id="gameOver" style="display: none;">
            <h1>GAME OVER</h1>
            <p id="finalScore">Skor Akhir: 0</p>
            <button onclick="restartGame()">MAIN LAGI</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 600;
        starsCanvas.width = 800;
        starsCanvas.height = 600;

        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let wave = 1;
        let keys = {};

        // Player
        const player = {
            x: 375,
            y: 520,
            width: 50,
            height: 50,
            speed: 5,
            color: '#4a90e2'
        };

        // Arrays
        let bullets = [];
        let aliens = [];
        let explosions = [];
        let stars = [];
        let alienBullets = [];

        // Initialize stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        // Draw stars
        function drawStars() {
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            stars.forEach(star => {
                starsCtx.fillStyle = '#fff';
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starsCtx.fill();
                
                star.y += star.speed;
                if (star.y > starsCanvas.height) {
                    star.y = 0;
                    star.x = Math.random() * starsCanvas.width;
                }
            });
        }

        // Draw player (spaceship)
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            
            // Ship body
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-20, 25);
            ctx.lineTo(0, 15);
            ctx.lineTo(20, 25);
            ctx.closePath();
            ctx.fill();
            
            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#1a1a3e';
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Engine glow
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(-10, 20, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(10, 20, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // Draw alien
        function drawAlien(alien) {
            ctx.save();
            ctx.translate(alien.x + alien.width / 2, alien.y + alien.height / 2);
            
            // Alien body
            ctx.fillStyle = alien.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = alien.color;
            
            // Head
            ctx.beginPath();
            ctx.ellipse(0, -5, 15, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#1a1a3e';
            ctx.beginPath();
            ctx.arc(-7, -8, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(7, -8, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Body
            ctx.fillStyle = alien.color;
            ctx.beginPath();
            ctx.arc(0, 8, 12, 0, Math.PI);
            ctx.fill();
            
            // Tentacles
            ctx.strokeStyle = alien.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-8, 15);
            ctx.lineTo(-12, 22);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(8, 15);
            ctx.lineTo(12, 22);
            ctx.stroke();
            
            ctx.restore();
        }

        // Create aliens
        function createAliens() {
            aliens = [];
            const rows = 3 + Math.floor(wave / 2);
            const cols = 6 + Math.floor(wave / 3);
            const colors = ['#ff6b6b', '#51cf66', '#ffd43b', '#da77f2'];
            
            for (let row = 0; row < Math.min(rows, 5); row++) {
                for (let col = 0; col < Math.min(cols, 10); col++) {
                    aliens.push({
                        x: col * 70 + 50,
                        y: row * 60 + 50,
                        width: 40,
                        height: 40,
                        speed: 0.3 + wave * 0.1,
                        direction: 1,
                        color: colors[row % colors.length]
                    });
                }
            }
        }

        // Shoot bullet
        function shoot() {
            bullets.push({
                x: player.x + player.width / 2 - 2,
                y: player.y,
                width: 4,
                height: 15,
                speed: 7,
                color: '#4af2a1'
            });
        }

        // Alien shoot
        function alienShoot(alien) {
            if (Math.random() < 0.005 + wave * 0.001) {
                alienBullets.push({
                    x: alien.x + alien.width / 2 - 2,
                    y: alien.y + alien.height,
                    width: 4,
                    height: 12,
                    speed: 3 + wave * 0.2,
                    color: alien.color
                });
            }
        }

        // Create explosion
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                explosions.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 4 + 2,
                    life: 30,
                    color: color
                });
            }
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move player
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            // Update bullets
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                
                // Draw bullet
                ctx.fillStyle = bullet.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                
                return bullet.y > 0;
            });

            // Update alien bullets
            alienBullets = alienBullets.filter(bullet => {
                bullet.y += bullet.speed;
                
                // Draw bullet
                ctx.fillStyle = bullet.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                
                // Check collision with player
                if (bullet.x < player.x + player.width &&
                    bullet.x + bullet.width > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + bullet.height > player.y) {
                    lives--;
                    updateUI();
                    createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#4a90e2');
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }
                
                return bullet.y < canvas.height;
            });

            // Update aliens
            let moveDown = false;
            aliens.forEach(alien => {
                alien.x += alien.speed * alien.direction;
                
                if (alien.x <= 0 || alien.x >= canvas.width - alien.width) {
                    moveDown = true;
                }

                alienShoot(alien);
                drawAlien(alien);
            });

            if (moveDown) {
                aliens.forEach(alien => {
                    alien.direction *= -1;
                    alien.y += 20;
                });
            }

            // Check collisions
            bullets.forEach((bullet, bIndex) => {
                aliens.forEach((alien, aIndex) => {
                    if (bullet.x < alien.x + alien.width &&
                        bullet.x + bullet.width > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + bullet.height > alien.y) {
                        aliens.splice(aIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        updateUI();
                        createExplosion(alien.x + alien.width / 2, alien.y + alien.height / 2, alien.color);
                    }
                });
            });

            // Update explosions
            explosions = explosions.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / 30;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                return particle.life > 0;
            });

            drawPlayer();

            // Check if wave completed
            if (aliens.length === 0) {
                wave++;
                updateUI();
                createAliens();
            }

            // Check if aliens reached bottom
            aliens.forEach(alien => {
                if (alien.y + alien.height > canvas.height - 100) {
                    gameOver();
                }
            });

            drawStars();
            requestAnimationFrame(update);
        }

        function updateUI() {
            document.getElementById('score').textContent = `Skor: ${score}`;
            document.getElementById('lives').textContent = `Nyawa: ${'❤️'.repeat(lives)}`;
            document.getElementById('wave').textContent = `Gelombang: ${wave}`;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            wave = 1;
            bullets = [];
            alienBullets = [];
            explosions = [];
            player.x = 375;
            updateUI();
            createAliens();
            initStars();
            update();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = `Skor Akhir: ${score}`;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && gameRunning) {
                e.preventDefault();
                shoot();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Initialize
        initStars();
        drawStars();
        setInterval(drawStars, 16);
    </script>
</body>
</html>

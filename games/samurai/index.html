<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="orientation" content="landscape">
<title>Samurai Slash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a0e1f;font-family:system-ui,Segoe UI,Roboto,sans-serif;color:#fff;touch-action:none;user-select:none}
#game{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
#hud{position:absolute;top:0;left:0;right:0;z-index:3;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.hpwrap{width:clamp(120px,26vw,200px)}
.hplbl{font-size:10px;letter-spacing:1px;opacity:.8}
.hpbar{height:12px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:rgba(0,0,0,.4);overflow:hidden;margin-top:3px}
#hpfill{height:100%;width:100%;background:linear-gradient(90deg,#ff3b3b,#ff8a3b);transition:width .15s}
.sc{margin-top:6px;font-weight:800;font-size:18px;text-shadow:0 0 8px rgba(0,0,0,.6)}
.sc small{display:block;font-size:10px;opacity:.7;font-weight:600}
.icons{display:flex;gap:8px;pointer-events:auto}
.iconbtn{width:38px;height:38px;border-radius:50%;font-size:16px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.35);color:#fff}
.iconbtn:active{transform:scale(.9)}
#joy{position:absolute;left:14px;bottom:14px;width:clamp(84px,24vh,118px);height:clamp(84px,24vh,118px);z-index:3}
#joyBase{position:absolute;inset:0;border-radius:50%;background:rgba(20,10,30,.28);border:2px solid rgba(255,255,255,.16);backdrop-filter:blur(2px)}
#joyKnob{position:absolute;left:50%;top:50%;width:clamp(38px,11vh,52px);height:clamp(38px,11vh,52px);border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,209,102,.95),rgba(255,94,94,.85));box-shadow:0 0 14px rgba(255,90,90,.5);pointer-events:none;transform:translate(-50%,-50%)}
#act{position:absolute;right:12px;bottom:14px;width:clamp(138px,40vh,168px);height:clamp(116px,33vh,148px);z-index:3}
.cb{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.28);background:rgba(20,10,30,.28);color:#fff;backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center}
.cb:active,.cb.on{transform:scale(.92)}
#bAtk{right:0;bottom:0;width:clamp(58px,16vh,74px);height:clamp(58px,16vh,74px);font-size:clamp(24px,7vh,30px);background:rgba(255,77,77,.34)}
#bAtk:active{background:rgba(255,77,77,.66)}
#bJump{right:4px;top:0;width:clamp(48px,13vh,58px);height:clamp(48px,13vh,58px);font-size:clamp(20px,5.5vh,24px)}
#bShield{left:0;bottom:clamp(26px,8vh,36px);width:clamp(48px,13vh,58px);height:clamp(48px,13vh,58px);font-size:clamp(20px,5.5vh,24px)}
.scr{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;text-align:center;background:rgba(15,8,20,.82);backdrop-filter:blur(5px);padding:24px}
.hide{display:none!important}
.title{font-size:clamp(30px,8vh,44px);font-weight:900;letter-spacing:2px;line-height:1.05;background:linear-gradient(90deg,#ff5e5e,#ffd166,#ff5e5e);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 14px rgba(255,90,90,.5))}
.sub{opacity:.78;font-size:14px;max-width:420px;line-height:1.5}
.big{font-size:clamp(38px,12vh,54px);font-weight:900;color:#ffd166;text-shadow:0 0 18px rgba(255,209,102,.6)}
.btn{padding:13px 36px;border:0;border-radius:40px;cursor:pointer;min-width:200px;font-size:16px;font-weight:800;letter-spacing:1px;color:#1a0e1f;background:linear-gradient(90deg,#ffd166,#ff5e5e);box-shadow:0 0 22px rgba(255,90,90,.5)}
.btn:active{transform:scale(.94)}
.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;box-shadow:none}
.keys{font-size:12px;opacity:.6;margin-top:4px;line-height:1.7}
.exithint{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.15);padding:9px 16px;border-radius:18px;font-size:13px}
</style>
</head>
<body>
<div id="game">
<canvas id="cv"></canvas>
<div id="hud">
  <div class="hpwrap"><div class="hplbl">NYAWA</div><div class="hpbar"><div id="hpfill"></div></div>
    <div class="sc"><span id="score">0</span><small>TERBAIK <span id="best">0</span></small></div></div>
  <div class="icons"><button class="iconbtn" id="muteBtn">🔊</button><button class="iconbtn" id="pauseBtn">⏸</button></div>
</div>

<div id="joy"><div id="joyBase"><div id="joyKnob"></div></div></div>
<div id="act">
  <button class="cb" id="bShield">🛡️</button>
  <button class="cb" id="bJump">🦘</button>
  <button class="cb" id="bAtk">🗡️</button>
</div>

<div class="scr" id="startScr">
  <div class="title">SAMURAI<br>SLASH</div>
  <div class="sub">Ronin bermata merah menyerang dari kegelapan. Tebas mereka sebelum mereka menebasmu!</div>
  <button class="btn" id="startBtn">MULAI</button>
  <button class="btn ghost" id="exitBtn1">KELUAR</button>
  <div class="keys">🕹️ joystick = gerak/lari • 🛡️ tahan = blok<br>🦘 lompat • 🗡️ tebas (3x combo)</div>
</div>

<div class="scr hide" id="pauseScr">
  <div class="title" style="font-size:32px">JEDA</div>
  <button class="btn" id="resumeBtn">LANJUT</button>
  <button class="btn ghost" id="exitBtn2">KELUAR</button>
</div>

<div class="scr hide" id="overScr">
  <div class="title" style="font-size:30px">GUGUR</div>
  <div class="sub">Musuh ditumbangkan</div>
  <div class="big" id="finalScore">0</div>
  <div class="sub" id="newBest" style="color:#ffd166">🏆 REKOR BARU!</div>
  <button class="btn" id="retryBtn">BALAS DENDAM</button>
  <button class="btn ghost" id="exitBtn3">KELUAR</button>
</div>
<div class="exithint hide" id="exitHint">Tekan tombol ◀ Back di HP untuk keluar</div>
</div>

<script>
(function(){
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var elScore=document.getElementById('score'),elBest=document.getElementById('best'),hpfill=document.getElementById('hpfill');
var scr={start:document.getElementById('startScr'),pause:document.getElementById('pauseScr'),over:document.getElementById('overScr')};
var finalScore=document.getElementById('finalScore'),newBest=document.getElementById('newBest'),exitHint=document.getElementById('exitHint'),muteBtn=document.getElementById('muteBtn');
var W=0,H=0,dpr=1,GROUND=96,DRAW_H=124,ENEMY_H=124,ENEMY_W=62,NOW=0;

/* orientasi otomatis: baca meta, suruh Android muter layar */
function applyOrientation(){var m=document.querySelector('meta[name="orientation"]');var v=m?m.getAttribute('content'):'portrait';if(window.Android&&typeof window.Android.setOrientation==='function'){try{window.Android.setOrientation(v);}catch(e){}}}
applyOrientation();

var FILES={idle:'Idle.png',run:'Run.png',walk:'Walk.png',jump:'Jump.png',atk1:'Attack_1.png',atk2:'Attack_2.png',atk3:'Attack_3.png',hurt:'Hurt.png',shield:'Shield.png'};
var ANIM={},loaded=0,total=Object.keys(FILES).length,ready=false;
Object.keys(FILES).forEach(function(k){
  var img=new Image();
  img.onload=function(){var fh=img.height||128,fw=fh,n=Math.max(1,Math.round(img.width/fw));ANIM[k]={img:img,fw:fw,fh:fh,n:n};loaded++;if(loaded>=total)ready=true;};
  img.onerror=function(){ANIM[k]={img:img,fw:128,fh:128,n:1,bad:true};loaded++;if(loaded>=total)ready=true;};
  img.src=FILES[k];
});

var state='start',bgHidden=false,last=0;
var best=0;try{best=parseInt(localStorage.getItem('samuraiBest')||'0',10)||0;}catch(e){}elBest.textContent=best;
var P={x:0,y:0,vy:0,facing:1,onGround:true,anim:'idle',fi:0,at:0,hp:100,maxhp:100,inv:0,hurtT:0,atkT:0,attacking:false,combo:0,comboW:0,blocking:false};
var enemies=[],parts=[],clouds=[];
var score=0,kills=0,time=0,spawnT=1.2;

var inp={left:false,right:false,shield:false,jumpQ:false,atkQ:false};

var joyBase=document.getElementById('joyBase'),joyKnob=document.getElementById('joyKnob');
var joyPtr=null,joyX=0,joyCX=0,joyCY=0,joyR=40;
function joyStart(e){if(joyPtr!==null)return;joyPtr=e.pointerId;var r=joyBase.getBoundingClientRect();joyCX=r.left+r.width/2;joyCY=r.top+r.height/2;joyR=r.width/2-6;try{joyBase.setPointerCapture(e.pointerId);}catch(_){}joyMove(e);e.preventDefault();}
function joyMove(e){if(e.pointerId!==joyPtr)return;var dx=e.clientX-joyCX,dy=e.clientY-joyCY,d=Math.hypot(dx,dy);if(d>joyR){dx=dx/d*joyR;dy=dy/d*joyR;}joyKnob.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px)';joyX=(d>6)?(dx/joyR):0;e.preventDefault();}
function joyEnd(e){if(e.pointerId!==joyPtr)return;joyPtr=null;joyX=0;joyKnob.style.transform='translate(-50%,-50%)';try{joyBase.releasePointerCapture(e.pointerId);}catch(_){}}
joyBase.addEventListener('pointerdown',joyStart);
joyBase.addEventListener('pointermove',joyMove);
joyBase.addEventListener('pointerup',joyEnd);
joyBase.addEventListener('pointercancel',joyEnd);
joyBase.addEventListener('lostpointercapture',joyEnd);

function hold(id,key){var b=document.getElementById(id);
  var on=function(e){e.preventDefault();inp[key]=true;b.classList.add('on');};
  var off=function(){inp[key]=false;b.classList.remove('on');};
  b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointercancel',off);b.addEventListener('pointerleave',off);}
function tap(id,key){var b=document.getElementById(id);b.addEventListener('pointerdown',function(e){e.preventDefault();inp[key]=true;});}
hold('bShield','shield');tap('bJump','jumpQ');tap('bAtk','atkQ');

var AC=null,master=null,audioOn=false,muted=false,sched=null,nextN=0,tick=0,noiseB=null;
var BPM=110,SIX=(60/BPM)/4;
var SCALE=[196.00,220.00,261.63,293.66,349.23,392.00],BASS=[98,82.41,110,87.31];
function env(g,t,p,d){try{g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(p,t+.005);g.gain.exponentialRampToValueAtTime(.0001,t+d);}catch(e){}}
function voice(f,t,d,tp,p,fl){try{var o=AC.createOscillator(),g=AC.createGain();o.type=tp;o.frequency.setValueAtTime(f,t);var nd=o;if(fl){var ff=AC.createBiquadFilter();ff.type='lowpass';ff.frequency.value=fl;o.connect(ff);nd=ff;}nd.connect(g);g.connect(master);env(g,t,p,d);o.start(t);o.stop(t+d+.05);}catch(e){}}
function kick(t){try{var o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(45,t+.12);g.connect(master);env(g,t,.85,.2);o.start(t);o.stop(t+.25);}catch(e){}}
function hat(t){try{var s=AC.createBufferSource();s.buffer=noiseB;var f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=7000;var g=AC.createGain();s.connect(f);f.connect(g);g.connect(master);env(g,t,.13,.05);s.start(t);s.stop(t+.06);}catch(e){}}
function step(n,t){var s=n%16,bar=Math.floor(n/16)%4;if(s%4===0)kick(t);if(s%4===2)hat(t);if(s===0||s===8)voice(BASS[bar],t,.3,'sawtooth',.34,700);if(s%2===0)voice(SCALE[(n*2+bar)%SCALE.length],t,.2,'triangle',.2);}
function scheduler(){if(!AC)return;try{while(nextN<AC.currentTime+.12){step(tick,nextN);nextN+=SIX;tick++;}}catch(e){}}
function sfx(type){if(!audioOn||muted||!AC)return;try{var t=AC.currentTime;
  if(type==='swoosh'){var s=AC.createBufferSource();s.buffer=noiseB;var f=AC.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(1400,t);f.frequency.exponentialRampToValueAtTime(300,t+.18);var g=AC.createGain();s.connect(f);f.connect(g);g.connect(master);env(g,t,.3,.2);s.start(t);s.stop(t+.22);}
  else if(type==='kill'){voice(660,t,.08,'square',.32);voice(330,t+.05,.12,'sawtooth',.28,900);var s2=AC.createBufferSource();s2.buffer=noiseB;var g2=AC.createGain();s2.connect(g2);g2.connect(master);env(g2,t,.35,.12);s2.start(t);s2.stop(t+.14);}
  else if(type==='hurt'){voice(140,t,.2,'sawtooth',.4,500);var s3=AC.createBufferSource();s3.buffer=noiseB;var f3=AC.createBiquadFilter();f3.type='lowpass';f3.frequency.value=900;var g3=AC.createGain();s3.connect(f3);f3.connect(g3);g3.connect(master);env(g3,t,.45,.25);s3.start(t);s3.stop(t+.28);}
}catch(e){}}
function startAudio(){try{if(audioOn)return;var WC=window.AudioContext||window.webkitAudioContext;if(!WC)return;AC=new WC();master=AC.createGain();master.gain.value=muted?0:.6;var comp=AC.createDynamicsCompressor();comp.threshold.value=-12;comp.knee.value=20;comp.ratio.value=4;comp.attack.value=.003;comp.release.value=.25;master.connect(comp);comp.connect(AC.destination);noiseB=AC.createBuffer(1,Math.floor(AC.sampleRate*.3),AC.sampleRate);var d=noiseB.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;nextN=AC.currentTime+.1;tick=0;sched=setInterval(scheduler,25);audioOn=true;}catch(e){}}
function toggleMute(){muted=!muted;if(master&&AC)try{master.gain.setValueAtTime(muted?0:.6,AC.currentTime);}catch(e){}muteBtn.textContent=muted?'🔇':'';}

function showOnly(k){for(var s in scr)scr[s].classList.add('hide');if(k)scr[k].classList.remove('hide');}
function hideAll(){for(var s in scr)scr[s].classList.add('hide');}

function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=Math.floor(W*dpr);cv.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
  GROUND=Math.round(Math.min(110,Math.max(72,H*0.24)));
  DRAW_H=Math.round(Math.min(124,Math.max(92,H*0.42)));
  ENEMY_H=DRAW_H;ENEMY_W=Math.round(DRAW_H*0.5);
  if(!P.x)P.x=W*0.35;P.y=H-GROUND;if(!clouds.length)for(var i=0;i<6;i++)clouds.push({x:Math.random()*W,y:20+Math.random()*110,s:.3+Math.random()*.6});}
window.addEventListener('resize',resize);

function startGame(){P.x=W*0.35;P.y=H-GROUND;P.vy=0;P.facing=1;P.onGround=true;P.hp=P.maxhp;P.inv=0;P.hurtT=0;P.atkT=0;P.attacking=false;P.combo=0;P.blocking=false;P.anim='idle';enemies=[];parts=[];score=0;kills=0;time=0;spawnT=1.0;joyX=0;state='play';hideAll();hpfill.style.width='100%';startAudio();if(AC&&AC.state==='suspended')try{AC.resume();}catch(e){}last=performance.now();}
function gameOver(){state='over';var s=kills;if(s>best){best=s;try{localStorage.setItem('samuraiBest',String(best));}catch(e){}elBest.textContent=best;newBest.style.display='block';}else newBest.style.display='none';finalScore.textContent=s;showOnly('over');}
function exitApp(){if(window.Android&&typeof window.Android.exitApp==='function'){window.Android.exitApp();return;}try{window.close();}catch(e){}exitHint.classList.remove('hide');setTimeout(function(){exitHint.classList.add('hide');},2500);}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
document.getElementById('pauseBtn').onclick=function(){if(state==='play'){state='pause';showOnly('pause');if(AC)try{AC.suspend();}catch(e){}}};
document.getElementById('resumeBtn').onclick=function(){state='play';hideAll();if(AC)try{AC.resume();}catch(e){}last=performance.now();};
document.getElementById('exitBtn1').onclick=exitApp;
document.getElementById('exitBtn2').onclick=exitApp;
document.getElementById('exitBtn3').onclick=exitApp;
muteBtn.onclick=toggleMute;
document.addEventListener('visibilitychange',function(){bgHidden=document.hidden;if(document.hidden){if(AC)try{AC.suspend();}catch(e){}}else{if(state==='play'&&AC)try{AC.resume();}catch(e){}last=performance.now();}});

function burst(x,y,c,n){for(var i=0;i<n;i++){var a=Math.random()*6.28,sp=2+Math.random()*5;parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:2+Math.random()*3,life:1,c:c});}}

function update(dt){
  time+=dt;
  inp.left=joyX<-0.3;inp.right=joyX>0.3;
  if(P.hurtT>0){P.hurtT-=dt;P.anim='hurt';P.at+=dt;P.inv-=dt;physics(dt);return;}
  P.inv-=dt;
  P.blocking=inp.shield&&P.onGround&&!P.attacking;
  var moving=false,spd=0;
  if(!P.attacking){
    if(inp.left&&!inp.right){P.facing=-1;moving=true;}
    else if(inp.right&&!inp.left){P.facing=1;moving=true;}
    if(moving)spd=P.blocking?150:320,P.x+=P.facing*spd*dt;
  }
  P.x=Math.max(40,Math.min(W-40,P.x));
  if(inp.jumpQ&&P.onGround&&!P.blocking&&!P.attacking){P.vy=-860;P.onGround=false;}
  inp.jumpQ=false;
  P.comboW-=dt;if(P.comboW<=0)P.combo=0;
  if(inp.atkQ&&!P.attacking&&!P.blocking){inp.atkQ=false;P.combo=(P.combo%3)+1;P.comboW=0.6;P.attacking=true;P.atkT=0.34;P.at=0;sfx('swoosh');}else inp.atkQ=false;
  if(P.attacking){P.atkT-=dt;P.at+=dt;if(P.atkT<=0)P.attacking=false;}
  var hitActive=P.attacking&&(0.34-P.atkT)>0.10&&(0.34-P.atkT)<0.24;
  if(hitActive){var hx=P.facing>0?P.x+8:P.x-8-72;
    for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];
      if(e.x+ENEMY_W/2>hx&&e.x-ENEMY_W/2<hx+72&&Math.abs((e.y-ENEMY_H/2)-(P.y-DRAW_H/2))<(DRAW_H*0.8)){burst(e.x,e.y-ENEMY_H/2,'#ff5e5e',18);enemies.splice(i,1);kills++;score=kills;elScore.textContent=score;sfx('kill');}}}
  if(P.attacking)P.anim=P.combo===1?'atk1':P.combo===2?'atk2':'atk3';
  else if(!P.onGround)P.anim='jump';
  else if(P.blocking&&!moving)P.anim='shield';
  else if(moving&&P.blocking)P.anim='walk';
  else if(moving)P.anim='run';
  else P.anim='idle';
  physics(dt);
  spawnT-=dt;var iv=Math.max(0.9,2.1-time*0.03);
  if(spawnT<=0&&enemies.length<4){spawnT=iv;var fromR=Math.random()>.3;enemies.push({x:fromR?W+50:-50,y:H-GROUND,dir:fromR?-1:1,bob:Math.random()*6});}
  var espd=58+Math.min(70,time*1.8);
  for(var j=enemies.length-1;j>=0;j--){var en=enemies[j];en.dir=P.x>en.x?1:-1;en.x+=en.dir*espd*dt;en.bob+=dt*10;
    if(Math.abs(en.x-P.x)<(ENEMY_W/2+20)&&P.inv<=0){
      if(P.blocking&&((en.x>P.x&&P.facing>0)||(en.x<P.x&&P.facing<0))){en.x-=en.dir*90*dt;burst(P.x+P.facing*30,P.y-60,'#9fd8ff',6);}
      else{P.hp-=20;P.inv=1.0;P.hurtT=0.4;P.at=0;P.attacking=false;P.vy=-260;P.x+=(P.x>en.x?1:-1)*40;hpfill.style.width=Math.max(0,P.hp)+'%';burst(P.x,P.y-60,'#ff3b3b',10);sfx('hurt');if(P.hp<=0){gameOver();return;}}}}
  for(var k=parts.length-1;k>=0;k--){var p=parts[k];p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=dt*1.8;if(p.life<=0)parts.splice(k,1);}
  for(var c=0;c<clouds.length;c++){clouds[c].x-=clouds[c].s*14*dt;if(clouds[c].x<-80)clouds[c].x=W+80;}
}
function physics(dt){P.vy+=2200*dt;P.y+=P.vy*dt;if(P.y>=H-GROUND){P.y=H-GROUND;P.vy=0;P.onGround=true;}}

function drawSprite(a,x,feetY,face){if(!a||a.bad||!a.n)return;var fr=Math.floor(P.at*10)%a.n;if(a.n===1)fr=0;var sc=DRAW_H/a.fh,dw=a.fw*sc,dh=DRAW_H;ctx.save();ctx.translate(x,feetY-dh);if(face<0){ctx.translate(dw,0);ctx.scale(-1,1);}ctx.drawImage(a.img,fr*a.fw,0,a.fw,a.fh,0,0,dw,dh);ctx.restore();}
function drawEnemy(e){
  var bob=Math.sin(e.bob)*3,x=e.x,y=e.y,eh=ENEMY_H,ew=ENEMY_W;
  ctx.save();ctx.translate(x,y);if(e.dir<0)ctx.scale(-1,1);
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,0,ew*0.62,9,0,0,7);ctx.fill();
  var pulse=0.30+0.18*Math.sin(NOW*0.006+e.bob);
  var ag=ctx.createRadialGradient(0,-eh*0.5,4,0,-eh*0.5,eh*0.7);
  ag.addColorStop(0,'rgba(255,40,40,'+pulse+')');ag.addColorStop(1,'rgba(255,40,40,0)');
  ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,-eh*0.5,eh*0.7,0,7);ctx.fill();
  ctx.fillStyle='#140812';ctx.beginPath();
  ctx.moveTo(-ew*0.24,-eh+bob+22);ctx.lineTo(ew*0.24,-eh+bob+22);ctx.lineTo(ew*0.5,-2);ctx.lineTo(-ew*0.5,-2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(160,40,90,.5)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#140812';ctx.beginPath();ctx.arc(0,-eh+bob+12,15,0,7);ctx.fill();
  ctx.beginPath();ctx.moveTo(-2,-eh+bob-2);ctx.lineTo(4,-eh+bob-12);ctx.lineTo(9,-eh+bob-2);ctx.closePath();ctx.fill();
  ctx.shadowBlur=14;ctx.shadowColor='#ff2020';ctx.fillStyle='#ff2b2b';
  ctx.fillRect(3,-eh+bob+9,6,5);ctx.fillRect(-4,-eh+bob+9,4,5);ctx.shadowBlur=0;
  ctx.strokeStyle='#e6ecff';ctx.lineWidth=4;ctx.shadowBlur=8;ctx.shadowColor='#9fd8ff';
  ctx.beginPath();ctx.moveTo(ew*0.2,-eh*0.55+bob);ctx.lineTo(ew*0.95,-eh*0.34+bob);ctx.stroke();ctx.shadowBlur=0;
  ctx.restore();
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function draw(){
  NOW=performance.now();
  ctx.clearRect(0,0,W,H);
  var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2a1330');g.addColorStop(.5,'#7a2b3f');g.addColorStop(1,'#d9743a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.shadowBlur=60;ctx.shadowColor='#ffce6b';ctx.fillStyle='#ffe0a0';ctx.beginPath();ctx.arc(W*0.78,H*0.4,Math.min(46,H*0.13),0,7);ctx.fill();ctx.restore();
  ctx.fillStyle='rgba(255,200,150,.18)';for(var c=0;c<clouds.length;c++){var cl=clouds[c];rr(cl.x,cl.y,70*cl.s+30,12,6);ctx.fill();}
  var px=-(P.x-W/2)*0.04;
  ctx.fillStyle='#3a1830';ctx.beginPath();ctx.moveTo(-50+px,H-GROUND);for(var mx=-50;mx<W+100;mx+=160)ctx.lineTo(mx+80+px,H-GROUND-Math.min(120,H*0.32));ctx.lineTo(W+50,H-GROUND);ctx.fill();
  ctx.fillStyle='#241022';ctx.beginPath();ctx.moveTo(-50+px*1.6,H-GROUND);for(var m2=-80;m2<W+120;m2+=120)ctx.lineTo(m2+60+px*1.6,H-GROUND-Math.min(70,H*0.18));ctx.lineTo(W+50,H-GROUND);ctx.fill();
  ctx.fillStyle='#1c0c18';ctx.fillRect(0,H-GROUND,W,GROUND);ctx.fillStyle='#3a1c2a';for(var gx=0;gx<W;gx+=14)ctx.fillRect(gx,H-GROUND,8,4);
  for(var i=0;i<enemies.length;i++)drawEnemy(enemies[i]);
  if(!(P.inv>0&&Math.floor(P.inv*16)%2))drawSprite(ANIM[P.anim],P.x,P.y,P.facing);
  if(P.attacking&&(0.34-P.atkT)>0.08&&(0.34-P.atkT)<0.26){ctx.save();ctx.translate(P.x+P.facing*30,P.y-DRAW_H*0.55);ctx.scale(P.facing,1);ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=4;ctx.shadowBlur=14;ctx.shadowColor='#fff';ctx.beginPath();ctx.arc(0,0,46,-0.9,0.9);ctx.stroke();ctx.restore();}
  for(var k=0;k<parts.length;k++){var p=parts[k];ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}ctx.globalAlpha=1;
}
function loop(now){requestAnimationFrame(loop);if(bgHidden)return;var dt=(now-last)/1000;last=now;if(dt>.05)dt=.05;if(state==='play')update(dt);draw();}
resize();requestAnimationFrame(loop);
})();
</script>
